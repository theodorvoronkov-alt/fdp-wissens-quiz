<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FDP Wissensquiz – JuLis Leipzig</title>
<style>
  :root {
    --fdp-yellow: #FFED00;
    --julis-magenta: #E5007D;
    --correct-green: #28a745;
    --wrong-red: #dc3545;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial,sans-serif;background: var(--fdp-yellow);color:#111;padding:1rem;min-height:100vh;display:flex;align-items:center;}
  #quiz-wrap{max-width:600px;margin:0 auto;padding:2rem;background:#fff;border-radius:15px;box-shadow: 0 10px 25px rgba(0,0,0,0.1);width:100%;}
  .header-tag{font-size:12px;color: var(--julis-magenta);font-weight:900;text-transform:uppercase;margin-bottom:6px;letter-spacing:1px}
  .header-title{font-size:24px;font-weight:900;margin-bottom:1.5rem;color:#111;border-bottom: 3px solid var(--julis-magenta);display:inline-block;padding-bottom:5px}
  #progress-bar-wrap{height:6px;background:#eee;border-radius:3px;margin-bottom:1.5rem;overflow:hidden}
  #progress-bar{height:100%;background: var(--julis-magenta);width:0%;transition:width 0.4s}
  .q-num{font-size:13px;color:#888;margin-bottom:8px;font-weight:bold}
  .q-text{font-size:17px;font-weight:700;color:#111;margin-bottom:20px;line-height:1.4}
  .opt-list{display:flex;flex-direction:column;gap:10px}
  .opt{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border:2px solid #eee;border-radius:10px;cursor:pointer;font-size:15px;font-weight:600;transition:all 0.2s;position:relative}
  .opt:hover{border-color: var(--julis-magenta);background:#fff9fc}
  
  /* Feedback Styles */
  .opt.correct { background: #d4edda !important; border-color: var(--correct-green) !important; color: #155724 !important; }
  .opt.wrong { background: #f8d7da !important; border-color: var(--wrong-red) !important; color: #721c24 !important; }
  .opt.disabled { pointer-events: none; }
  .icon { font-weight: bold; font-size: 18px; }

  #btn-wrap{margin-top:2rem;display:flex;justify-content:center}
  #nav-btn{padding:12px 30px;border:none;border-radius:30px;background: var(--julis-magenta);color:#fff;font-size:15px;font-weight:bold;cursor:pointer;display:none;box-shadow: 0 4px 10px rgba(229,0,125,0.3)}
  #nav-btn:hover{transform:translateY(-2px);box-shadow: 0 6px 15px rgba(229,0,125,0.4)}

  #result-block{display:none;text-align:center}
  .score-display{font-size:50px;font-weight:900;color: var(--julis-magenta);margin:1rem 0}
  #retry-btn{padding:10px 20px;background:none;border:2px solid var(--julis-magenta);color:var(--julis-magenta);border-radius:30px;cursor:pointer;font-weight:bold;margin-top:1rem}
</style>
</head>
<body>

<div id="quiz-wrap">
  <div class="header-tag">JuLis Leipzig</div>
  <div class="header-title">FDP Wissensquiz</div>
  
  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
  
  <div id="quiz-content">
    <div id="questions-area"></div>
    <div id="btn-wrap"><button id="nav-btn">Nächste Frage</button></div>
  </div>

  <div id="result-block">
    <div class="header-tag">Ergebnis</div>
    <div class="header-title" id="res-title">Quiz beendet</div>
    <div class="score-display" id="res-score">0/15</div>
    <p id="res-text" style="margin-bottom:1.5rem; line-height:1.5"></p>
    <button id="retry-btn" onclick="location.reload()">Nochmal versuchen</button>
  </div>
</div>

<script>
const questions = [
  {q: "Wann wurde die FDP gegründet?", o: ["1945", "1948", "1949", "1950", "1955"], a: 1},
  {q: "Wo fand der Gründungsparteitag statt?", o: ["Heppenheim", "Bonn", "Leipzig", "Berlin", "Weimar"], a: 0},
  {q: "Wer war der erste FDP-Bundespräsident?", o: ["Walter Scheel", "Theodor Heuss", "Reinhold Maier", "Guido Westerwelle", "Christian Lindner"], a: 1},
  {q: "Welche Farbe steht für die FDP?", o: ["Grün", "Rot", "Gelb", "Blau", "Orange"], a: 2},
  {q: "Wer führt die FDP aktuell an?", o: ["Wolfgang Kubicki", "Bettina Stark-Watzinger", "Christian Dürr", "Marco Buschmann", "Christian Lindner"], a: 2},
  {q: "Wer war der legendäre Außenminister (1974-1992)?", o: ["Klaus Kinkel", "Hans-Dietrich Genscher", "Philipp Rösler", "Rainer Brüderle", "Otto Graf Lambsdorff"], a: 1},
  {q: "Wie heißt die FDP-Nachwuchsorganisation?", o: ["Junge Liberale", "Liberale Jugend", "Jungdemokraten", "FDP-Kids", "Freiheits-Jugend"], a: 0},
  {q: "Welches Ministerium hatte die FDP in der Ampel Regierung?", o: ["Gesundheit", "Verteidigung", "Finanzen", "Arbeit", "Umwelt"], a: 2},
  {q: "Wie lautet der Name der parteinahen Stiftung?", o: ["Konrad-Adenauer-Stiftung", "Friedrich-Naumann-Stiftung", "Hanns-Seidel-Stiftung", "Heinrich-Böll-Stiftung", "Rosa-Luxemburg-Stiftung"], a: 1},
  {q: "In welchem Jahr kehrte die FDP grandios in den Bundestag zurück?", o: ["2013", "2017", "2021", "2009", "2005"], a: 1},
  {q: "Was forderte die FDP historisch in den 'Freiburger Thesen'?", o: ["Sozialliberalismus", "Reinen Kapitalismus", "Monarchismus", "Staatswirtschaft", "Atomkraft-Ausbau"], a: 0},
  {q: "Wer ist FDP-Generalsekretär?", o: ["Christian Dürr", "Johannes Vogel", "Nicole Büttner", "Konstantin Kuhle", "Bijan Djir-Sarai"], a: 2},
  {q: "Woher kam Hans-Dietrich Genscher ursprünglich?", o: ["Halle (Saale)", "Leipzig", "München", "Hamburg", "Köln"], a: 0},
  {q: "Was ist ein Kernanliegen der FDP-Bildungspolitik?", o: ["Einheitsschule", "Bildungsgutscheine", "Verbot von Privatschulen", "Kürzung von BAföG", "Zentralabitur für alle"], a: 1},
  {q: "Wie viele Jahre war die FDP insgesamt an Bundesregierungen beteiligt?", o: ["Über 40 Jahre", "Unter 10 Jahre", "Genau 50 Jahre", "Bisher nie", "Nur 2 Jahre"], a: 0}
];

let currentIdx = 0;
let score = 0;

const qArea = document.getElementById('questions-area');
const navBtn = document.getElementById('nav-btn');
const progBar = document.getElementById('progress-bar');

function render() {
  const q = questions[currentIdx];
  navBtn.style.display = 'none';
  
  let html = `<div class="q-num">Frage ${currentIdx + 1} von ${questions.length}</div>`;
  html += `<div class="q-text">${q.q}</div><div class="opt-list">`;
  q.o.forEach((opt, i) => {
    html += `<div class="opt" onclick="check(${i}, this)">${opt}<span class="icon"></span></div>`;
  });
  html += `</div>`;
  qArea.innerHTML = html;
  progBar.style.width = `${(currentIdx / questions.length) * 100}%`;
}

window.check = (i, el) => {
  const correct = questions[currentIdx].a;
  const allOpts = document.querySelectorAll('.opt');
  
  allOpts.forEach(opt => opt.classList.add('disabled'));

  if (i === correct) {
    el.classList.add('correct');
    el.querySelector('.icon').innerText = '✓';
    score++;
  } else {
    el.classList.add('wrong');
    el.querySelector('.icon').innerText = '✗';
    allOpts[correct].classList.add('correct');
    allOpts[correct].querySelector('.icon').innerText = '✓';
  }

  navBtn.style.display = 'block';
  if(currentIdx === questions.length - 1) navBtn.innerText = "Zum Ergebnis";
};

navBtn.onclick = () => {
  currentIdx++;
  if (currentIdx < questions.length) {
    render();
  } else {
    showResult();
  }
};

function showResult() {
  document.getElementById('quiz-content').style.display = 'none';
  document.getElementById('result-block').style.display = 'block';
  progBar.style.width = '100%';
  document.getElementById('res-score').innerText = `${score}/${questions.length}`;
  
  let text = "";
  if(score === 15) text = "Absoluter Profi! Du bist bereit für das Bundespräsidium!";
  else if(score > 10) text = "Super Ergebnis! Du kennst dich bei den Liberalen bestens aus.";
  else if(score > 5) text = "Nicht schlecht, aber da ist noch Luft nach oben. Komm mal zum Stammtisch!";
  else text = "Das üben wir nochmal! Schau doch mal ins Grundsatzprogramm.";
  document.getElementById('res-text').innerText = text;
}

render();
</script>
</body>
</html>
